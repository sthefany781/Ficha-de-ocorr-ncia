<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Registro de Ocorrências</title>
  <link rel="stylesheet" href="../CSS/stylenegativo.css">
</head>

<body>

  <div class="sidebar">
    <h2>Escola</h2>
    <div class="menu-item"> Início</div>
    <div class="menu-item"> Nova Ocorrência</div>
    <div class="menu-item"> Histórico</div>
    <div class="menu-item"> Relatórios</div>
    <div class="menu-item"> Configurações</div>
  </div>

  <div class="main">

    <div class="header">
      Registro de Ocorrências
    </div>

    <div class="container">

      <div class="form-box">
        <label>Nome do Estudante</label>
        <input type="text" id="nome">

        <label>CGM</label>
        <input type="text" id="cgm">

        <label>Série/Turma</label>
        <select id="serie">
          <option>Selecione a série/turma</option>
          <option>6º Ano A</option>
          <option>6º Ano B</option>
          <option>6º Ano C</option>
          <option>6º Ano D</option>
          <option>6º Ano E</option>
          <option>6º Ano F</option>
          <option>7º Ano A</option>
          <option>7º Ano B</option>
          <option>7º Ano C</option>
          <option>7º Ano D</option>
          <option>7º Ano E</option>
          <option>7º Ano F</option>
          <option>8º Ano A</option>
          <option>8º Ano B</option>
          <option>8º Ano C</option>
          <option>8º Ano D</option>
          <option>8º Ano E</option>
          <option>8º Ano F</option>
          <option>9º Ano A</option>
          <option>9º Ano B</option>
          <option>9º Ano C</option>
          <option>9º Ano D</option>
          <option>9º Ano E</option>
          <option>9º Ano F</option>
          <option>1º Ano A</option>
          <option>1º Ano B</option>
          <option>1º Ano C</option>
          <option>1º Ano D</option>
          <option>1º Ano E</option>
          <option>2º Ano A</option>
          <option>2º Ano B</option>
          <option>2º Ano C</option>
          <option>2º Ano D</option>
          <option>2º Ano E</option>
          <option>3º Ano A</option>
          <option>3º Ano B</option>
          <option>3º Ano C</option>
          <option>3º Ano D</option>
          <option>3º Ano E</option>
        </select>

        <label>Disciplina</label>
        <select id="disciplina">
          <option>Selecione a disciplina</option>
          <option>Matemática</option>
          <option>Português</option>
          <option>Geografia</option>
          <option>História</option>
          <option>Lingua Inglesa</option>
          <option>Lingua Espanhola</option>
          <option>Recomposição de Português</option>
          <option>Recomposição de Matemática</option>
          <option>Astronomia</option>
          <option>Educação Financeira</option>
          <option>Física</option>
          <option>Química</option>
          <option>Projeto de Vida</option>
          <option>Artes</option>
          <option>Educação Física</option>
          <option>Cidadania e Civismo</option>
          <option>Biologia</option>
          <option>Filosofia</option>
          <option>Analise e Projeto de Sistemas</option>
          <option>Banco de Dados</option>
          <option>Ciências de Dados</option>
          <option>Computação Gráfica</option>
          <option>Programação Back-end</option>
          <option>Programação Mobile</option>
          <option>Programação DS</option>
          <option>RG</option>
          <option>Direito</option>
        </select>

        <label>Profissional CCM</label>
        <input type="text" id="professor">

        <label>Data</label>
        <input type="date" id="data">
      </div>

      <div class="form-box">

        <label>Tipo de Ocorrência</label>
        <div class="tipo">
          <div class="negativa" onclick="selecionarTipo('negativa')">Negativa</div>
          <div class="positiva" onclick="selecionarTipo('positiva')">Positiva</div>
        </div>

        <label>Descrição</label>
        <textarea id="descricao" rows="6"></textarea>

        <div class="buttons">
          <button class="btn salvar" onclick="salvar()">Salvar</button>
          <button class="btn limpar" onclick="limpar()">Limpar</button>
        </div>

      </div>

    </div>

  </div>

  <script src="../JS/script.js"></script>
</body>

</html>
